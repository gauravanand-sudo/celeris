<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Celeris — RTL Simulator &amp; Hot Path Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1e1e1e;
      --surface:    #252526;
      --surface2:   #2d2d30;
      --surface3:   #333337;
      --border:     #3e3e42;
      --text:       #cccccc;
      --text-dim:   #858585;
      --text-bright:#e8e8e8;
      --accent:     #007acc;
      --accent-dim: #0a4f7e;
      --red:        #e74c3c;
      --orange:     #f39c12;
      --green:      #27ae60;
      --blue:       #3498db;
      --purple:     #9b59b6;
      --font-mono:  'Consolas', 'Courier New', monospace;
      --font-ui:    'Segoe UI', system-ui, -apple-system, sans-serif;
      --radius:     4px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); font-size: 13px; line-height: 1.5; overflow: hidden; }

    /* ── Header ── */
    header { display: flex; align-items: center; justify-content: space-between; height: 44px; padding: 0 16px; background: #1a1a1c; border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10; }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
    .logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, #007acc 0%, #00aaff 60%, #00d4aa 100%); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: white; letter-spacing: -1px; font-family: var(--font-mono); flex-shrink: 0; }
    .logo-text { font-size: 16px; font-weight: 700; color: var(--text-bright); letter-spacing: 0.5px; }
    .logo-tagline { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .cycle-label { font-size: 12px; color: var(--text-dim); }
    .cycle-input { width: 70px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 12px; padding: 3px 6px; outline: none; }
    .cycle-input:focus { border-color: var(--accent); }
    .btn-simulate { display: flex; align-items: center; gap: 7px; background: var(--accent); color: white; border: none; border-radius: var(--radius); padding: 6px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
    .btn-simulate:hover:not(:disabled) { background: #0090ef; }
    .btn-simulate:disabled { background: var(--accent-dim); cursor: default; opacity: 0.7; }
    .spinner { width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    .btn-simulate.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .github-link { display: flex; align-items: center; gap: 5px; color: var(--text-dim); text-decoration: none; font-size: 12px; padding: 4px 8px; border-radius: var(--radius); border: 1px solid var(--border); transition: color 0.15s, border-color 0.15s; }
    .github-link:hover { color: var(--text-bright); border-color: #666; }

    /* ── Layout ── */
    .main { display: flex; height: calc(100vh - 44px); }
    .pane-editor { width: 50%; min-width: 300px; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
    .pane-title { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--surface); border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); flex-shrink: 0; }
    .pane-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    #editor-container { flex: 1; overflow: hidden; }
    .pane-results { width: 50%; display: flex; flex-direction: column; overflow: hidden; }
    .results-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 12px; display: flex; flex-direction: column; gap: 12px; }
    .results-scroll::-webkit-scrollbar { width: 6px; }
    .results-scroll::-webkit-scrollbar-track { background: transparent; }
    .results-scroll::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
    * { scrollbar-width: thin; scrollbar-color: #555 transparent; }

    /* ── Placeholder ── */
    .placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); gap: 12px; text-align: center; padding: 24px; }
    .placeholder-icon { font-size: 40px; opacity: 0.3; }
    .placeholder h3 { font-size: 15px; color: var(--text); font-weight: 600; }
    .placeholder p { font-size: 12px; max-width: 260px; }

    /* ── Progress steps ── */
    .progress-panel { padding: 16px; }
    .progress-title { font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; }
    .step-list { display: flex; flex-direction: column; gap: 0; }
    .step { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-left: 2px solid #333; margin-left: 10px; padding-left: 18px; position: relative; }
    .step:last-child { border-left-color: transparent; }
    .step-dot { position: absolute; left: -7px; width: 12px; height: 12px; border-radius: 50%; background: #333; border: 2px solid #555; flex-shrink: 0; transition: all 0.2s; }
    .step.waiting .step-dot { background: #2a2a2a; border-color: #444; }
    .step.active  .step-dot { background: var(--accent); border-color: #5fb3f5; animation: pulse 1s ease-in-out infinite; }
    .step.done    .step-dot { background: var(--green); border-color: #4ae07a; }
    .step.error   .step-dot { background: var(--red); border-color: #f07070; }
    .step.active  { border-left-color: var(--accent-dim); }
    .step.done    { border-left-color: #1a5c2a; }
    .step.error   { border-left-color: #5a1a1a; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,122,204,0.4)} 50%{box-shadow:0 0 0 5px rgba(0,122,204,0)} }
    .step-label { font-size: 13px; color: var(--text); font-weight: 500; }
    .step.waiting .step-label { color: var(--text-dim); }
    .step.done    .step-label { color: #4ae07a; }
    .step.error   .step-label { color: var(--red); }
    .step-detail { font-size: 11px; color: var(--text-dim); margin-top: 2px; line-height: 1.4; }
    .step-timing { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); margin-top: 2px; }

    /* ── Parse error panel ── */
    .parse-error-panel { background: #2a1515; border: 1px solid #6a2020; border-radius: 6px; overflow: hidden; }
    .parse-error-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #3a1818; border-bottom: 1px solid #6a2020; }
    .parse-error-header .icon { font-size: 16px; }
    .parse-error-header .title { font-size: 13px; font-weight: 700; color: var(--red); }
    .parse-error-header .stage { font-size: 11px; color: #e88; margin-left: auto; font-family: var(--font-mono); }
    .parse-error-body { padding: 10px 14px; }
    .parse-error-item { display: flex; gap: 8px; padding: 5px 0; border-bottom: 1px solid #3a2020; }
    .parse-error-item:last-child { border-bottom: none; }
    .parse-error-num { font-family: var(--font-mono); font-size: 11px; color: #888; flex-shrink: 0; padding-top: 1px; }
    .parse-error-msg { font-size: 12px; color: #e88; line-height: 1.5; }
    .parse-error-hint { font-size: 11px; color: #aa6644; margin-top: 8px; padding: 6px 10px; background: #1e1010; border-radius: 3px; }

    /* ── Cards ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .card-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--surface2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.9px; color: var(--text-dim); }
    .card-body { padding: 10px 12px; }

    /* ── Module info ── */
    .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
    .info-item { background: var(--surface3); border-radius: var(--radius); padding: 8px 10px; }
    .info-item .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-dim); margin-bottom: 2px; }
    .info-item .value { font-size: 17px; font-weight: 700; color: var(--text-bright); font-family: var(--font-mono); }
    .info-item .value.sm { font-size: 13px; word-break: break-all; }

    /* ── Simulation trace ── */
    .trace-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .trace-stat { background: var(--surface3); border-radius: var(--radius); padding: 7px 10px; }
    .trace-stat .ts-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 2px; }
    .trace-stat .ts-value { font-size: 15px; font-weight: 700; color: var(--text-bright); font-family: var(--font-mono); }
    .trace-stat .ts-sub { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
    .region-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .region-row { display: grid; grid-template-columns: 80px 1fr auto; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #2a2a2a; }
    .region-row:last-child { border-bottom: none; }
    .region-name { font-size: 12px; color: var(--text-bright); font-weight: 600; }
    .region-bar-track { height: 6px; background: var(--surface3); border-radius: 3px; overflow: hidden; }
    .region-bar-fill { height: 100%; border-radius: 3px; }
    .region-count { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); white-space: nowrap; }
    .region-desc { font-size: 10px; color: #555; margin-top: 1px; }
    .event-log { display: flex; flex-direction: column; gap: 2px; }
    .event-log-item { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); padding: 3px 6px; background: var(--surface2); border-radius: 2px; border-left: 2px solid #444; }
    .signal-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .sig-chip { font-family: var(--font-mono); font-size: 11px; padding: 2px 7px; border-radius: 3px; border: 1px solid; }
    .sig-chip.clk { background: #0a1a2a; border-color: #1a4a6a; color: #5ba3e8; }
    .sig-chip.rst { background: #1a0a0a; border-color: #5a1a1a; color: #e07070; }

    /* ── Heat rows ── */
    .heat-list { display: flex; flex-direction: column; gap: 4px; }
    .heat-row { display: flex; align-items: center; gap: 8px; padding: 6px 6px; border-radius: var(--radius); transition: background 0.1s; min-width: 0; overflow: hidden; }
    .heat-row:hover { background: var(--surface2); }
    .heat-name { font-family: var(--font-mono); font-size: 12px; color: var(--text-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 110px; flex-shrink: 0; }
    .heat-bar-track { flex: 1; height: 7px; background: var(--surface3); border-radius: 4px; overflow: hidden; min-width: 40px; }
    .heat-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
    .heat-meta { display: flex; align-items: center; gap: 5px; flex-shrink: 0; min-width: 0; }
    .heat-count { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); min-width: 52px; text-align: right; flex-shrink: 0; }

    /* ── Warnings panel ── */
    .warnings-panel { background: #1e1800; border: 1px solid #4a3800; border-radius: 6px; overflow: hidden; }
    .warnings-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #2a2000; border-bottom: 1px solid #4a3800; }
    .warnings-header .title { font-size: 12px; font-weight: 700; color: var(--orange); }
    .warnings-header .count { font-size: 11px; color: #a07020; margin-left: auto; font-family: var(--font-mono); }
    .warning-item { display: flex; gap: 8px; padding: 6px 12px; border-bottom: 1px solid #2a2200; font-size: 12px; color: #c09040; line-height: 1.5; }
    .warning-item:last-child { border-bottom: none; }
    .warning-num { font-family: var(--font-mono); font-size: 11px; color: #604820; flex-shrink: 0; padding-top: 1px; }

    /* ── Badges ── */
    .badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    .badge-input  { background: #1a3a1a; color: #4caf50; }
    .badge-output { background: #1a2a3a; color: #5ba3e8; }
    .badge-wire   { background: #2a2a1a; color: #c8b820; }
    .badge-reg    { background: #2a1a2a; color: #c080e0; }
    .badge-inout  { background: #2a1a1a; color: #e07070; }
    .badge-seq    { background: #1a2a3a; color: #5ba3e8; }
    .badge-comb   { background: #2a2a1a; color: #c8b820; }

    /* ── Critical path ── */
    .critical-path { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; padding: 8px 0; }
    .path-signal { display: flex; align-items: center; gap: 6px; }
    .path-chip { background: var(--surface3); border: 1px solid var(--border); border-radius: 3px; padding: 3px 8px; font-family: var(--font-mono); font-size: 12px; color: var(--text-bright); }
    .path-chip.hot  { border-color: var(--red);    color: var(--red); }
    .path-chip.warm { border-color: var(--orange);  color: var(--orange); }
    .path-arrow { color: var(--text-dim); font-size: 14px; }

    /* ── Suggestions ── */
    .suggestion-list { display: flex; flex-direction: column; gap: 6px; }
    .suggestion-item { display: flex; gap: 10px; padding: 8px 10px; border-radius: var(--radius); border-left: 3px solid transparent; background: var(--surface3); }
    .suggestion-item.error   { border-left-color: var(--red); }
    .suggestion-item.warning { border-left-color: var(--orange); }
    .suggestion-item.info    { border-left-color: var(--blue); }
    .sug-icon { font-size: 14px; flex-shrink: 0; line-height: 1.4; }
    .sug-content { flex: 1; min-width: 0; }
    .sug-category { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 2px; }
    .sug-message { font-size: 12px; color: var(--text); line-height: 1.45; word-break: break-word; }

    /* ── Status bar ── */
    .status-bar { display: flex; align-items: center; gap: 16px; padding: 0 12px; height: 22px; font-size: 11px; color: rgba(255,255,255,0.9); flex-shrink: 0; background: #007acc; }
    .status-bar.ready   { background: #007acc; }
    .status-bar.running { background: #6b3fa0; }
    .status-bar.done    { background: #15803d; }
    .status-bar.error   { background: #9b1c1c; }
    .status-item { display: flex; align-items: center; gap: 4px; }

    .drives-chip { display: inline-flex; align-items: center; gap: 3px; font-family: var(--font-mono); font-size: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 2px; padding: 0 4px; color: var(--text-dim); margin-top: 2px; margin-right: 3px; }
  </style>
</head>
<body>

<header>
  <a class="logo" href="https://github.com/gauravanand-sudo/celeris" target="_blank" rel="noopener">
    <div class="logo-icon">Ce</div>
    <div>
      <div class="logo-text">Celeris</div>
      <div class="logo-tagline">RTL Simulator &amp; Hot Path Analyzer</div>
    </div>
  </a>
  <div class="header-right">
    <span class="cycle-label">Cycles:</span>
    <input class="cycle-input" type="number" id="cycles-input" value="500" min="1" max="100000" />
    <button class="btn-simulate" id="btn-sim" onclick="runSimulation()">
      <div class="spinner"></div>
      <span class="btn-label">▶ Simulate</span>
    </button>
    <a class="github-link" href="https://github.com/gauravanand-sudo/celeris" target="_blank" rel="noopener">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.745 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
      GitHub

</header>

<div class="main">
  <div class="pane-editor">
    <div class="pane-title"><div class="dot"></div>Verilog Editor <span style="margin-left:auto;font-size:10px;font-weight:400">Ctrl+Enter to run</span></div>
    <div id="editor-container"></div>
  </div>

  <div class="pane-results">
    <div class="pane-title"><div class="dot" style="background:var(--green)"></div>Analysis</div>
    <div class="results-scroll" id="results-panel">
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">⚡</div>
        <h3>Ready to Analyze</h3>
        <p>Paste or edit Verilog on the left, then click <strong>▶ Simulate</strong></p>
      </div>
    </div>
    <div class="status-bar ready" id="status-bar">
      <div class="status-item">● Ready — Ctrl+Enter to simulate</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script>
const SAMPLE = `module alu_pipeline (
    input        clk,
    input        rst,
    input        en,
    input  [7:0] a,
    input  [7:0] b,
    input  [2:0] op,
    output reg [8:0] result,
    output reg       overflow,
    output reg       zero
);

    reg [7:0] a_s1, b_s1;
    reg [2:0] op_s1;

    wire [8:0] add_result = {1'b0, a} + {1'b0, b};
    wire [8:0] sub_result = {1'b0, a} - {1'b0, b};
    wire [7:0] and_result = a & b;
    wire [7:0] or_result  = a | b;
    wire [7:0] xor_result = a ^ b;

    always @(posedge clk or posedge rst) begin
        if (rst) begin
            a_s1  <= 8'b0;
            b_s1  <= 8'b0;
            op_s1 <= 3'b0;
        end else if (en) begin
            a_s1  <= a;
            b_s1  <= b;
            op_s1 <= op;
        end
    end

    always @(posedge clk or posedge rst) begin
        if (rst) begin
            result   <= 9'b0;
            overflow <= 1'b0;
            zero     <= 1'b0;
        end else begin
            case (op_s1)
                3'b000: result <= add_result;
                3'b001: result <= sub_result;
                3'b010: result <= {1'b0, and_result};
                3'b011: result <= {1'b0, or_result};
                3'b100: result <= {1'b0, xor_result};
                default: result <= 9'b0;
            endcase
            overflow <= (op_s1 == 3'b000) && add_result[8];
            zero     <= (result == 9'b0);
        end
    end

endmodule`;

let editor = null;

require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
require(['vs/editor/editor.main'], function() {
  monaco.languages.register({ id: 'verilog' });
  monaco.languages.setMonarchTokensProvider('verilog', {
    tokenizer: {
      root: [
        [/\/\/.*$/, 'comment'],
        [/\/\*/, 'comment', '@comment'],
        [/\b(module|endmodule|input|output|inout|wire|reg|always|assign|begin|end|if|else|case|casez|casex|endcase|posedge|negedge|or|and|not|for|while|repeat|forever|initial|parameter|localparam|integer|real|time|default|function|endfunction|task|endtask|generate|endgenerate|genvar|signed|unsigned)\b/, 'keyword'],
        [/\d+'[bBoOdDhH][0-9a-fA-FxXzZ_]+/, 'number'],
        [/\b\d+\b/, 'number'],
        [/[A-Za-z_][A-Za-z0-9_$]*/, 'identifier'],
        [/[{}()\[\]]/, 'delimiter.bracket'],
        [/[<>=!&|^~+\-*/%@]/, 'operator'],
        [/[;,.]/, 'delimiter'],
      ],
      comment: [ [/[^/*]+/, 'comment'], [/\*\//, 'comment', '@pop'], [/[/*]/, 'comment'] ],
    },
  });
  monaco.editor.defineTheme('celeris-dark', {
    base: 'vs-dark', inherit: true,
    rules: [
      { token: 'keyword',    foreground: '569cd6', fontStyle: 'bold' },
      { token: 'comment',    foreground: '6a9955', fontStyle: 'italic' },
      { token: 'number',     foreground: 'b5cea8' },
      { token: 'identifier', foreground: '9cdcfe' },
    ],
    colors: { 'editor.background': '#1e1e1e', 'editor.foreground': '#d4d4d4', 'editorLineNumber.foreground': '#858585', 'editor.selectionBackground': '#264f78', 'editor.lineHighlightBackground': '#2a2d2e' },
  });
  editor = monaco.editor.create(document.getElementById('editor-container'), {
    value: SAMPLE, language: 'verilog', theme: 'celeris-dark',
    fontSize: 13, lineHeight: 20, fontFamily: "'Consolas', 'Courier New', monospace",
    minimap: { enabled: true, maxColumn: 60 }, scrollBeyondLastLine: false,
    automaticLayout: true, wordWrap: 'off', folding: true,
    glyphMargin: false, lineDecorationsWidth: 8,
    scrollbar: { verticalScrollbarSize: 8, horizontalScrollbarSize: 8 },
  });
  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, () => runSimulation());
});

// ── Helpers ──────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function heat(v) {
  return v > 0.7 ? '#e74c3c' : v > 0.4 ? '#f39c12' : '#27ae60';
}
function heatBg(v) {
  return v > 0.7 ? 'rgba(231,76,60,0.10)' : v > 0.4 ? 'rgba(243,156,18,0.08)' : 'rgba(39,174,96,0.08)';
}
function badge(kind) {
  const m = { input:'badge-input', output:'badge-output', wire:'badge-wire', reg:'badge-reg', inout:'badge-inout', sequential:'badge-seq', combinational:'badge-comb' };
  const label = kind === 'sequential' ? 'seq' : kind === 'combinational' ? 'comb' : kind;
  return `<span class="badge ${m[kind]||'badge-wire'}">${label}</span>`;
}
function setStatus(state, text) {
  const b = document.getElementById('status-bar');
  b.className = 'status-bar ' + state;
  b.innerHTML = `<div class="status-item">${text}</div>`;
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

// ── Progress panel ───────────────────────────────────────────────
const STEPS = [
  { label: 'Parsing RTL',          detail: 'Tokenizing Verilog — extracting signals, ports, processes, sensitivity lists' },
  { label: 'Elaborating design',   detail: 'Resolving connectivity, building sensitivity map, categorizing clock / reset' },
  { label: 'Simulating delta cycles', detail: 'Propagating events through Active → NBA → Postponed regions each cycle' },
  { label: 'Analyzing hot paths',  detail: 'Ranking by activation count, tracing critical path, generating suggestions' },
];

function showProgress() {
  const panel = document.getElementById('results-panel');
  const items = STEPS.map((s, i) => `
    <div class="step waiting" id="step-${i}">
      <div class="step-dot"></div>
      <div>
        <div class="step-label">${esc(s.label)}</div>
        <div class="step-detail">${esc(s.detail)}</div>
        <div class="step-timing" id="step-timing-${i}"></div>
      </div>
    </div>`).join('');
  panel.innerHTML = `<div class="progress-panel"><div class="progress-title">Running simulation</div><div class="step-list">${items}</div></div>`;
}

function stepState(idx, state, timing) {
  const el = document.getElementById(`step-${idx}`);
  if (el) {
    el.className = `step ${state}`;
    if (timing) document.getElementById(`step-timing-${idx}`).textContent = timing;
  }
}

// ── Main simulation function ─────────────────────────────────────
async function runSimulation() {
  const btn = document.getElementById('btn-sim');
  if (btn.disabled) return;

  const verilog = editor ? editor.getValue() : '';
  const cycles  = parseInt(document.getElementById('cycles-input').value) || 500;

  btn.disabled = true;
  btn.classList.add('loading');
  btn.querySelector('.btn-label').textContent = 'Running…';
  setStatus('running', '⚙ Simulating…');

  showProgress();

  const t0 = Date.now();

  // Step 0: Parse (show immediately)
  stepState(0, 'active');
  await sleep(250);

  try {
    const resp = await fetch('/api/simulate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ verilog, cycles }),
    });

    const t1 = Date.now();

    // ── Parse / validation error (422) ──────────────────────────
    if (resp.status === 422) {
      const body = await resp.json();
      const errors = body.detail?.errors || [body.detail || 'Parse failed'];
      const warns  = body.detail?.warnings || [];
      stepState(0, 'error', `failed after ${t1-t0}ms`);

      const panel = document.getElementById('results-panel');
      const warnHtml = warns.length > 0 ? `
        <div class="warnings-panel" style="margin-top:10px">
          <div class="warnings-header"><span class="title">⚠ ${warns.length} Warning${warns.length>1?'s':''}</span></div>
          <div>${warns.map((w,i)=>`<div class="warning-item"><div class="warning-num">${i+1}.</div><div>${esc(w)}</div></div>`).join('')}</div>
        </div>` : '';

      panel.innerHTML = `
        <div class="parse-error-panel">
          <div class="parse-error-header">
            <span class="icon">✖</span>
            <span class="title">Parse Error — simulation blocked</span>
            <span class="stage">stage: ${esc(body.detail?.stage || 'parse')}</span>
          </div>
          <div class="parse-error-body">
            ${errors.map((e, i) => `
              <div class="parse-error-item">
                <div class="parse-error-num">${i+1}.</div>
                <div class="parse-error-msg">${esc(e)}</div>
              </div>`).join('')}
            <div class="parse-error-hint">
              💡 Fix the syntax above and try again. Valid Verilog needs: <code>module … endmodule</code>,
              port declarations (<code>input</code>/<code>output</code>/<code>wire</code>/<code>reg</code>),
              and at least one process (<code>always @(…)</code> or <code>assign</code>).
            </div>
          </div>
        </div>${warnHtml}`;

      setStatus('error', `✖ Parse error — ${errors[0].slice(0, 80)}`);
      return;
    }

    if (!resp.ok) {
      const body = await resp.json().catch(() => ({}));
      const errors = body.detail?.errors || [body.detail || resp.statusText];
      throw new Error(errors[0]);
    }

    const data = await resp.json();

    // Animate remaining steps
    stepState(0, 'done', `${Math.round((t1-t0)*0.3)}ms`);
    stepState(1, 'active');
    await sleep(200);
    stepState(1, 'done', `${Math.round((t1-t0)*0.2)}ms`);
    stepState(2, 'active');
    await sleep(300);
    stepState(2, 'done', `${Math.round((t1-t0)*0.4)}ms`);
    stepState(3, 'active');
    await sleep(150);
    stepState(3, 'done', `${Math.round((t1-t0)*0.1)}ms`);

    await sleep(200);
    renderResults(data);
    setStatus('done', `✓ Done — ${data.total_activations.toLocaleString()} events · ${data.delta_cycles} delta cycles · ${Date.now()-t0}ms`);

  } catch (err) {
    const panel = document.getElementById('results-panel');
    panel.innerHTML = `
      <div class="parse-error-panel">
        <div class="parse-error-header"><span class="icon">✖</span><span class="title">Error</span></div>
        <div class="parse-error-body"><div class="parse-error-msg">${esc(err.message)}</div></div>
      </div>`;
    setStatus('error', '✖ ' + err.message.slice(0, 80));
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.querySelector('.btn-label').textContent = '▶ Simulate';
  }
}

// ── Render results ───────────────────────────────────────────────
function renderResults(data) {
  const panel = document.getElementById('results-panel');
  let h = '';

  // ── Warnings (non-fatal) ──────────────────────────────────────
  const warns = data.warnings || [];
  if (warns.length > 0) {
    h += `
    <div class="warnings-panel">
      <div class="warnings-header">
        <span class="title">⚠ ${warns.length} Warning${warns.length>1?'s':''}</span>
        <span class="count">${warns.length} issue${warns.length>1?'s':''} detected</span>
      </div>
      <div>${warns.map((w,i)=>`<div class="warning-item"><div class="warning-num">${i+1}.</div><div>${esc(w)}</div></div>`).join('')}</div>
    </div>`;
  }

  // ── Module overview ──────────────────────────────────────────
  h += `
  <div class="card">
    <div class="card-header"><div class="card-title">Module Overview</div><span style="font-size:11px;color:var(--text-dim)">${esc(data.module_name)}</span></div>
    <div class="card-body">
      <div class="info-grid">
        <div class="info-item"><div class="label">Signals</div><div class="value">${data.total_signals}</div></div>
        <div class="info-item"><div class="label">Processes</div><div class="value">${data.total_processes}</div></div>
        <div class="info-item"><div class="label">Cycles</div><div class="value">${data.sim_cycles.toLocaleString()}</div></div>
        <div class="info-item"><div class="label">Activations</div><div class="value sm">${data.total_activations.toLocaleString()}</div></div>
        <div class="info-item"><div class="label">Delta Cycles</div><div class="value sm">${data.delta_cycles.toLocaleString()}</div></div>
      </div>
    </div>
  </div>`;

  // ── Simulation trace ─────────────────────────────────────────
  const maxRegion = Math.max(...(data.region_stats||[]).map(r => r.activations), 1);
  const regionColors = ['#007acc', '#9b59b6', '#27ae60'];
  const clkChips = (data.clock_signals||[]).map(s => `<span class="sig-chip clk">⏱ ${esc(s)}</span>`).join('');
  const rstChips = (data.reset_signals||[]).map(s => `<span class="sig-chip rst">↺ ${esc(s)}</span>`).join('');

  h += `
  <div class="card">
    <div class="card-header"><div class="card-title">⚡ Simulation Trace</div><span style="font-size:11px;color:var(--text-dim)">${data.avg_delta_per_cycle} events/cycle avg</span></div>
    <div class="card-body">
      <div class="trace-grid">
        <div class="trace-stat">
          <div class="ts-label">Delta cycles</div>
          <div class="ts-value">${data.delta_cycles.toLocaleString()}</div>
          <div class="ts-sub">event propagation steps</div>
        </div>
        <div class="trace-stat">
          <div class="ts-label">Max queue depth</div>
          <div class="ts-value">${data.max_queue_depth}</div>
          <div class="ts-sub">events in a single cycle</div>
        </div>
      </div>

      <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:6px">IEEE 1800 Scheduling Regions</div>
      <div class="region-list">
        ${(data.region_stats||[]).map((r, i) => `
        <div>
          <div class="region-row">
            <div class="region-name">${esc(r.name)}</div>
            <div class="region-bar-track"><div class="region-bar-fill" style="width:${Math.round(r.activations/maxRegion*100)}%;background:${regionColors[i]||'#555'}"></div></div>
            <div class="region-count">${r.activations.toLocaleString()}</div>
          </div>
          <div class="region-desc" style="padding-left:88px;margin-bottom:4px">${esc(r.description)}</div>
        </div>`).join('')}
      </div>

      ${clkChips || rstChips ? `
      <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.7px;margin:10px 0 6px">Detected signals</div>
      <div class="signal-chips">${clkChips}${rstChips}</div>` : ''}

      ${data.event_log && data.event_log.length > 0 ? `
      <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.7px;margin:10px 0 6px">Event log</div>
      <div class="event-log">${data.event_log.map(e => `<div class="event-log-item">${esc(e)}</div>`).join('')}</div>` : ''}
    </div>
  </div>`;

  // ── Hot signals ──────────────────────────────────────────────
  if (data.hot_signals && data.hot_signals.length > 0) {
    const top = data.hot_signals.slice(0, 15);
    h += `
    <div class="card">
      <div class="card-header"><div class="card-title">🔥 Hot Signals</div><span style="font-size:11px;color:var(--text-dim)">top ${top.length} / ${data.hot_signals.length}</span></div>
      <div class="card-body">
        <div class="heat-list">
          ${top.map(s => `
          <div class="heat-row" style="background:${heatBg(s.heat)}" title="${esc(s.name)} — ${s.width}-bit ${s.kind}">
            <div class="heat-name">${esc(s.name)}</div>
            <div class="heat-bar-track"><div class="heat-bar-fill" style="width:${Math.round(s.heat*100)}%;background:${heat(s.heat)}"></div></div>
            <div class="heat-meta">${badge(s.kind)} <span style="font-size:10px;color:var(--text-dim)">${s.width}b</span></div>
            <div class="heat-count">${s.activations.toLocaleString()}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
  }

  // ── Hot processes ────────────────────────────────────────────
  if (data.hot_processes && data.hot_processes.length > 0) {
    const top = data.hot_processes.slice(0, 15);
    h += `
    <div class="card">
      <div class="card-header"><div class="card-title">⚙ Hot Processes</div><span style="font-size:11px;color:var(--text-dim)">top ${top.length} / ${data.hot_processes.length}</span></div>
      <div class="card-body">
        <div class="heat-list">
          ${top.map(p => `
          <div class="heat-row" style="background:${heatBg(p.heat)}">
            <div style="width:130px;flex-shrink:0;min-width:0">
              <div class="heat-name">${esc(p.name)}</div>
              <div style="margin-top:2px">${(p.drives||[]).slice(0,4).map(d=>`<span class="drives-chip">→ ${esc(d)}</span>`).join('')}</div>
            </div>
            <div class="heat-bar-track"><div class="heat-bar-fill" style="width:${Math.round(p.heat*100)}%;background:${heat(p.heat)}"></div></div>
            <div class="heat-meta">${badge(p.kind)}</div>
            <div class="heat-count">${p.activations.toLocaleString()}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
  }

  // ── Critical path ────────────────────────────────────────────
  if (data.critical_path && data.critical_path.length > 0) {
    const sigHeat = {};
    (data.hot_signals||[]).forEach(s => { sigHeat[s.name] = s.heat; });
    h += `
    <div class="card">
      <div class="card-header"><div class="card-title">→ Critical Path</div><span style="font-size:11px;color:var(--text-dim)">${data.critical_path.length} nodes</span></div>
      <div class="card-body">
        <div class="critical-path">
          ${data.critical_path.map((sig, i) => {
            const hv = sigHeat[sig] || 0;
            const cls = hv > 0.7 ? 'hot' : hv > 0.4 ? 'warm' : '';
            return `<div class="path-signal"><div class="path-chip ${cls}">${esc(sig)}</div>${i < data.critical_path.length-1 ? '<div class="path-arrow">→</div>' : ''}</div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  }

  // ── Suggestions ──────────────────────────────────────────────
  const SEV = {
    error:   { color:'#e74c3c', icon:'✖', bg:'rgba(231,76,60,0.10)' },
    warning: { color:'#f39c12', icon:'⚠', bg:'rgba(243,156,18,0.08)' },
    info:    { color:'#3498db', icon:'ℹ', bg:'rgba(52,152,219,0.08)' },
  };
  const sugs = data.suggestions || [];
  h += `
  <div class="card">
    <div class="card-header"><div class="card-title">💡 Suggestions</div><span style="font-size:11px;color:var(--text-dim)">${sugs.length} found</span></div>
    <div class="card-body">
      ${sugs.length > 0 ? `<div class="suggestion-list">
        ${sugs.map(s => {
          const c = SEV[s.severity] || SEV.info;
          return `<div class="suggestion-item ${s.severity}" style="background:${c.bg}">
            <div class="sug-icon" style="color:${c.color}">${c.icon}</div>
            <div class="sug-content">
              <div class="sug-category" style="color:${c.color}">${esc(s.category)}</div>
              <div class="sug-message">${esc(s.message)}</div>
            </div>
          </div>`;
        }).join('')}
      </div>` : `<div style="color:var(--text-dim);font-size:12px;padding:4px 0">No suggestions — design looks clean.</div>`}
    </div>
  </div>`;

  panel.innerHTML = h;
}
</script>
</body>
</html>
