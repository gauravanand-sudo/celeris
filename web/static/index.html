<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Celeris — RTL Simulator &amp; Hot Path Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1e1e1e;
      --surface:    #252526;
      --surface2:   #2d2d30;
      --surface3:   #333337;
      --border:     #3e3e42;
      --text:       #cccccc;
      --text-dim:   #858585;
      --text-bright:#e8e8e8;
      --accent:     #007acc;
      --accent-dim: #0a4f7e;
      --red:        #e74c3c;
      --orange:     #f39c12;
      --green:      #27ae60;
      --blue:       #3498db;
      --purple:     #9b59b6;
      --font-mono:  'Consolas', 'Courier New', monospace;
      --font-ui:    'Segoe UI', system-ui, -apple-system, sans-serif;
      --radius:     4px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 44px;
      padding: 0 16px;
      background: #1a1a1c;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #007acc 0%, #00aaff 60%, #00d4aa 100%);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 900;
      color: white;
      letter-spacing: -1px;
      font-family: var(--font-mono);
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: 0.5px;
    }

    .logo-tagline {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cycle-label {
      font-size: 12px;
      color: var(--text-dim);
    }

    .cycle-input {
      width: 70px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      padding: 3px 6px;
      outline: none;
    }
    .cycle-input:focus { border-color: var(--accent); }

    .btn-simulate {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-simulate:hover:not(:disabled) { background: #0090ef; }
    .btn-simulate:disabled { background: var(--accent-dim); cursor: default; opacity: 0.7; }

    .spinner {
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-simulate.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .github-link {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: color 0.15s, border-color 0.15s;
    }
    .github-link:hover { color: var(--text-bright); border-color: #666; }
    .github-link svg { flex-shrink: 0; }

    /* ── Main layout ─────────────────────────────────────── */
    .main {
      display: flex;
      height: calc(100vh - 44px);
    }

    /* ── Editor pane ─────────────────────────────────────── */
    .pane-editor {
      width: 50%;
      min-width: 340px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .pane-title {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .pane-title .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    #editor-container {
      flex: 1;
      overflow: hidden;
    }

    /* ── Results pane ────────────────────────────────────── */
    .pane-results {
      width: 50%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .results-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .results-scroll::-webkit-scrollbar { width: 6px; }
    .results-scroll::-webkit-scrollbar-track { background: transparent; }
    .results-scroll::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

    /* ── Placeholder ─────────────────────────────────────── */
    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      gap: 12px;
      text-align: center;
      padding: 24px;
    }
    .placeholder-icon {
      font-size: 40px;
      opacity: 0.3;
    }
    .placeholder h3 { font-size: 15px; color: var(--text); font-weight: 600; }
    .placeholder p { font-size: 12px; max-width: 260px; }

    /* ── Cards ───────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .card-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: var(--text-dim);
    }

    .card-body { padding: 10px 12px; }

    /* ── Module info grid ────────────────────────────────── */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px;
    }

    .info-item {
      background: var(--surface3);
      border-radius: var(--radius);
      padding: 8px 10px;
    }

    .info-item .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-dim);
      margin-bottom: 2px;
    }

    .info-item .value {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-bright);
      font-family: var(--font-mono);
    }

    .info-item .value.module-name {
      font-size: 13px;
      word-break: break-all;
    }

    /* ── Heat rows ───────────────────────────────────────── */
    .heat-list { display: flex; flex-direction: column; gap: 4px; }

    .heat-row {
      display: grid;
      grid-template-columns: 150px 1fr 80px 50px;
      align-items: center;
      gap: 8px;
      padding: 5px 6px;
      border-radius: var(--radius);
      transition: background 0.1s;
    }
    .heat-row:hover { background: var(--surface2); }

    .heat-name {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-bright);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .heat-bar-track {
      height: 8px;
      background: var(--surface3);
      border-radius: 4px;
      overflow: hidden;
    }

    .heat-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .heat-kind {
      text-align: right;
    }

    .badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-input  { background: #1a3a1a; color: #4caf50; }
    .badge-output { background: #1a2a3a; color: #5ba3e8; }
    .badge-wire   { background: #2a2a1a; color: #c8b820; }
    .badge-reg    { background: #2a1a2a; color: #c080e0; }
    .badge-inout  { background: #2a1a1a; color: #e07070; }

    .badge-seq    { background: #1a2a3a; color: #5ba3e8; }
    .badge-comb   { background: #2a2a1a; color: #c8b820; }

    .heat-count {
      text-align: right;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ── Critical path ───────────────────────────────────── */
    .critical-path {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      padding: 8px 0;
    }

    .path-signal {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .path-chip {
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 3px 8px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-bright);
    }

    .path-chip.hot { border-color: var(--red); color: var(--red); }
    .path-chip.warm { border-color: var(--orange); color: var(--orange); }

    .path-arrow {
      color: var(--text-dim);
      font-size: 14px;
    }

    /* ── Suggestions ─────────────────────────────────────── */
    .suggestion-list { display: flex; flex-direction: column; gap: 6px; }

    .suggestion-item {
      display: flex;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius);
      border-left: 3px solid transparent;
      background: var(--surface3);
    }

    .suggestion-item.error   { border-left-color: var(--red); }
    .suggestion-item.warning { border-left-color: var(--orange); }
    .suggestion-item.info    { border-left-color: var(--blue); }

    .sug-icon {
      font-size: 14px;
      flex-shrink: 0;
      line-height: 1.4;
    }

    .sug-content { flex: 1; min-width: 0; }

    .sug-category {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 2px;
    }

    .sug-message {
      font-size: 12px;
      color: var(--text);
      line-height: 1.45;
      word-break: break-word;
    }

    .sug-signal {
      display: inline-block;
      margin-top: 3px;
      font-family: var(--font-mono);
      font-size: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0 4px;
      color: var(--text-dim);
    }

    /* ── Error panel ─────────────────────────────────────── */
    .error-panel {
      background: #2a1515;
      border: 1px solid #5a2020;
      border-radius: 6px;
      padding: 10px 14px;
    }
    .error-panel .error-title {
      font-weight: 700;
      color: var(--red);
      margin-bottom: 6px;
      font-size: 12px;
    }
    .error-panel .error-msg {
      font-family: var(--font-mono);
      font-size: 11px;
      color: #e88;
      word-break: break-all;
    }

    /* ── Parse error banner ──────────────────────────────── */
    .parse-errors {
      background: #2a2010;
      border: 1px solid #5a4010;
      border-radius: 6px;
      padding: 8px 12px;
    }
    .parse-errors .pe-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--orange);
      margin-bottom: 4px;
    }
    .parse-errors .pe-item {
      font-family: var(--font-mono);
      font-size: 11px;
      color: #e0b060;
      padding: 1px 0;
    }

    /* ── Drives tooltip simulation ───────────────────────── */
    .drives-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-family: var(--font-mono);
      font-size: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0 4px;
      color: var(--text-dim);
      margin-top: 2px;
      margin-right: 3px;
      vertical-align: middle;
    }

    /* ── Scrollbar for whole results ─────────────────────── */
    * { scrollbar-width: thin; scrollbar-color: #555 transparent; }

    /* ── Status bar ──────────────────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 12px;
      height: 22px;
      background: var(--accent);
      font-size: 11px;
      color: rgba(255,255,255,0.9);
      flex-shrink: 0;
    }

    .status-bar.ready   { background: #007acc; }
    .status-bar.running { background: #6b3fa0; }
    .status-bar.done    { background: #15803d; }
    .status-bar.error   { background: #9b1c1c; }

    .status-item { display: flex; align-items: center; gap: 4px; }
  </style>
</head>

<!-- Monaco Editor CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script>
// ── Sample Verilog ────────────────────────────────────────────
const SAMPLE_VERILOG = `module alu_pipeline (
    input        clk,
    input        rst,
    input        en,
    input  [7:0] a,
    input  [7:0] b,
    input  [2:0] op,
    output reg [8:0] result,
    output reg       overflow,
    output reg       zero
);

    reg [7:0] a_s1, b_s1;
    reg [2:0] op_s1;

    wire [8:0] add_result = {1'b0, a} + {1'b0, b};
    wire [8:0] sub_result = {1'b0, a} - {1'b0, b};
    wire [7:0] and_result = a & b;
    wire [7:0] or_result  = a | b;
    wire [7:0] xor_result = a ^ b;

    always @(posedge clk or posedge rst) begin
        if (rst) begin
            a_s1  <= 8'b0;
            b_s1  <= 8'b0;
            op_s1 <= 3'b0;
        end else if (en) begin
            a_s1  <= a;
            b_s1  <= b;
            op_s1 <= op;
        end
    end

    always @(posedge clk or posedge rst) begin
        if (rst) begin
            result   <= 9'b0;
            overflow <= 1'b0;
            zero     <= 1'b0;
        end else begin
            case (op_s1)
                3'b000: result <= add_result;
                3'b001: result <= sub_result;
                3'b010: result <= {1'b0, and_result};
                3'b011: result <= {1'b0, or_result};
                3'b100: result <= {1'b0, xor_result};
                default: result <= 9'b0;
            endcase
            overflow <= (op_s1 == 3'b000) && add_result[8];
            zero     <= (result == 9'b0);
        end
    end

endmodule`;

// ── Monaco setup ──────────────────────────────────────────────
let editor = null;

require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
require(['vs/editor/editor.main'], function() {
  // Register a simple Verilog language with token highlighting
  monaco.languages.register({ id: 'verilog' });
  monaco.languages.setMonarchTokensProvider('verilog', {
    keywords: [
      'module','endmodule','input','output','inout','wire','reg','always','assign',
      'begin','end','if','else','case','casez','casex','endcase','posedge','negedge',
      'or','and','not','for','while','repeat','forever','initial','parameter',
      'localparam','integer','real','time','default','function','endfunction','task',
      'endtask','generate','endgenerate','genvar','signed','unsigned',
    ],
    tokenizer: {
      root: [
        [/\/\/.*$/, 'comment'],
        [/\/\*/, 'comment', '@comment'],
        [/\b(module|endmodule|input|output|inout|wire|reg|always|assign|begin|end|if|else|case|casez|casex|endcase|posedge|negedge|or|and|not|for|while|repeat|forever|initial|parameter|localparam|integer|real|time|default|function|endfunction|task|endtask|generate|endgenerate|genvar|signed|unsigned)\b/, 'keyword'],
        [/\d+'[bBoOdDhH][0-9a-fA-FxXzZ_]+/, 'number'],
        [/\b\d+\b/, 'number'],
        [/[A-Za-z_][A-Za-z0-9_$]*/, 'identifier'],
        [/[{}()\[\]]/, 'delimiter.bracket'],
        [/[<>=!&|^~+\-*/%@]/, 'operator'],
        [/"[^"]*"/, 'string'],
        [/[;,.]/, 'delimiter'],
      ],
      comment: [
        [/[^/*]+/, 'comment'],
        [/\*\//, 'comment', '@pop'],
        [/[/*]/, 'comment'],
      ],
    },
  });

  monaco.editor.defineTheme('celeris-dark', {
    base: 'vs-dark',
    inherit: true,
    rules: [
      { token: 'keyword',    foreground: '569cd6', fontStyle: 'bold' },
      { token: 'comment',    foreground: '6a9955', fontStyle: 'italic' },
      { token: 'number',     foreground: 'b5cea8' },
      { token: 'identifier', foreground: '9cdcfe' },
      { token: 'string',     foreground: 'ce9178' },
      { token: 'operator',   foreground: 'd4d4d4' },
    ],
    colors: {
      'editor.background': '#1e1e1e',
      'editor.foreground': '#d4d4d4',
      'editorLineNumber.foreground': '#858585',
      'editor.selectionBackground': '#264f78',
      'editor.lineHighlightBackground': '#2a2d2e',
    },
  });

  editor = monaco.editor.create(document.getElementById('editor-container'), {
    value: SAMPLE_VERILOG,
    language: 'verilog',
    theme: 'celeris-dark',
    fontSize: 13,
    lineHeight: 20,
    fontFamily: "'Consolas', 'Courier New', monospace",
    minimap: { enabled: true, maxColumn: 60 },
    scrollBeyondLastLine: false,
    renderLineHighlight: 'line',
    automaticLayout: true,
    wordWrap: 'off',
    folding: true,
    glyphMargin: false,
    lineDecorationsWidth: 8,
    overviewRulerLanes: 0,
    hideCursorInOverviewRuler: true,
    scrollbar: {
      verticalScrollbarSize: 8,
      horizontalScrollbarSize: 8,
    },
  });

  // Keyboard shortcut: Ctrl+Enter / Cmd+Enter to simulate
  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, () => runSimulation());
});

// ── Heat color ────────────────────────────────────────────────
function heatColor(heat) {
  if (heat > 0.7) return '#e74c3c';   // red - hot
  if (heat > 0.4) return '#f39c12';   // orange - warm
  return '#27ae60';                    // green - cool
}

function heatColorBg(heat) {
  if (heat > 0.7) return 'rgba(231,76,60,0.15)';
  if (heat > 0.4) return 'rgba(243,156,18,0.12)';
  return 'rgba(39,174,96,0.10)';
}

// ── Severity config ───────────────────────────────────────────
const SEV = {
  error:   { color: '#e74c3c', icon: '✖', bg: 'rgba(231,76,60,0.12)' },
  warning: { color: '#f39c12', icon: '⚠', bg: 'rgba(243,156,18,0.10)' },
  info:    { color: '#3498db', icon: 'ℹ', bg: 'rgba(52,152,219,0.10)' },
};

// ── Kind badge ────────────────────────────────────────────────
function kindBadge(kind) {
  const map = {
    input: 'badge-input', output: 'badge-output', wire: 'badge-wire',
    reg: 'badge-reg', inout: 'badge-inout',
    sequential: 'badge-seq', combinational: 'badge-comb',
  };
  const cls = map[kind] || 'badge-wire';
  const label = kind === 'sequential' ? 'seq' : kind === 'combinational' ? 'comb' : kind;
  return `<span class="badge ${cls}">${label}</span>`;
}

// ── Status bar ────────────────────────────────────────────────
function setStatus(state, text) {
  const bar = document.getElementById('status-bar');
  bar.className = 'status-bar ' + state;
  bar.innerHTML = `<div class="status-item">${text}</div>`;
}

// ── Run simulation ────────────────────────────────────────────
async function runSimulation() {
  const btn = document.getElementById('btn-sim');
  if (btn.disabled) return;

  const verilog = editor ? editor.getValue() : '';
  const cycles = parseInt(document.getElementById('cycles-input').value) || 500;

  btn.disabled = true;
  btn.classList.add('loading');
  btn.querySelector('.btn-label').textContent = 'Simulating…';
  setStatus('running', '⚙ Running simulation…');

  try {
    const resp = await fetch('/api/simulate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ verilog, cycles }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ detail: resp.statusText }));
      throw new Error(err.detail || 'Simulation failed');
    }

    const data = await resp.json();
    renderResults(data);
    setStatus('done', `✓ Done — ${data.total_activations.toLocaleString()} activations across ${data.sim_cycles} cycles`);
  } catch (err) {
    renderError(err.message);
    setStatus('error', '✖ ' + err.message.slice(0, 80));
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.querySelector('.btn-label').textContent = '▶ Simulate';
  }
}

// ── Render error ──────────────────────────────────────────────
function renderError(msg) {
  const panel = document.getElementById('results-panel');
  panel.innerHTML = `
    <div class="error-panel">
      <div class="error-title">✖ Simulation Error</div>
      <div class="error-msg">${escHtml(msg)}</div>
    </div>`;
}

// ── Render results ────────────────────────────────────────────
function renderResults(data) {
  const panel = document.getElementById('results-panel');
  let html = '';

  // Parse errors banner
  if (data.parse_errors && data.parse_errors.length > 0) {
    html += `<div class="parse-errors">
      <div class="pe-title">⚠ Parse Warnings (${data.parse_errors.length})</div>
      ${data.parse_errors.map(e => `<div class="pe-item">• ${escHtml(e)}</div>`).join('')}
    </div>`;
  }

  // Module info card
  html += `
  <div class="card">
    <div class="card-header">
      <div class="card-title">Module Overview</div>
      <span style="font-size:11px;color:var(--text-dim)">${data.sim_cycles} cycles simulated</span>
    </div>
    <div class="card-body">
      <div class="info-grid">
        <div class="info-item">
          <div class="label">Module</div>
          <div class="value module-name">${escHtml(data.module_name)}</div>
        </div>
        <div class="info-item">
          <div class="label">Signals</div>
          <div class="value">${data.total_signals}</div>
        </div>
        <div class="info-item">
          <div class="label">Processes</div>
          <div class="value">${data.total_processes}</div>
        </div>
        <div class="info-item">
          <div class="label">Cycles</div>
          <div class="value">${data.sim_cycles.toLocaleString()}</div>
        </div>
        <div class="info-item">
          <div class="label">Activations</div>
          <div class="value">${data.total_activations.toLocaleString()}</div>
        </div>
      </div>
    </div>
  </div>`;

  // Hot signals
  if (data.hot_signals && data.hot_signals.length > 0) {
    const top = data.hot_signals.slice(0, 15);
    html += `
    <div class="card">
      <div class="card-header">
        <div class="card-title">🔥 Hot Signals</div>
        <span style="font-size:11px;color:var(--text-dim)">top ${top.length} of ${data.hot_signals.length}</span>
      </div>
      <div class="card-body">
        <div class="heat-list">
          ${top.map(s => `
          <div class="heat-row" style="background:${heatColorBg(s.heat)}" title="${escHtml(s.name)} — ${s.width}-bit ${s.kind}">
            <div class="heat-name">${escHtml(s.name)}</div>
            <div class="heat-bar-track">
              <div class="heat-bar-fill" style="width:${Math.round(s.heat*100)}%;background:${heatColor(s.heat)}"></div>
            </div>
            <div class="heat-kind">${kindBadge(s.kind)} <span style="font-size:10px;color:var(--text-dim)">${s.width}b</span></div>
            <div class="heat-count">${s.activations.toLocaleString()}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
  }

  // Hot processes
  if (data.hot_processes && data.hot_processes.length > 0) {
    const top = data.hot_processes.slice(0, 15);
    html += `
    <div class="card">
      <div class="card-header">
        <div class="card-title">⚙ Hot Processes</div>
        <span style="font-size:11px;color:var(--text-dim)">top ${top.length} of ${data.hot_processes.length}</span>
      </div>
      <div class="card-body">
        <div class="heat-list">
          ${top.map(p => {
            const drivesHtml = (p.drives || []).slice(0, 5)
              .map(d => `<span class="drives-chip">→ ${escHtml(d)}</span>`).join('');
            return `
          <div class="heat-row" style="background:${heatColorBg(p.heat)}">
            <div>
              <div class="heat-name">${escHtml(p.name)}</div>
              <div style="margin-top:2px">${drivesHtml}</div>
            </div>
            <div class="heat-bar-track">
              <div class="heat-bar-fill" style="width:${Math.round(p.heat*100)}%;background:${heatColor(p.heat)}"></div>
            </div>
            <div class="heat-kind">${kindBadge(p.kind)}</div>
            <div class="heat-count">${p.activations.toLocaleString()}</div>
          </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  }

  // Critical path
  if (data.critical_path && data.critical_path.length > 0) {
    const maxAct = data.hot_signals.length > 0 ? data.hot_signals[0].activations : 1;
    const sigActMap = {};
    (data.hot_signals || []).forEach(s => { sigActMap[s.name] = s.heat; });

    html += `
    <div class="card">
      <div class="card-header">
        <div class="card-title">→ Critical Path</div>
        <span style="font-size:11px;color:var(--text-dim)">${data.critical_path.length} nodes</span>
      </div>
      <div class="card-body">
        <div class="critical-path">
          ${data.critical_path.map((sig, idx) => {
            const heat = sigActMap[sig] || 0;
            const chipClass = heat > 0.7 ? 'hot' : heat > 0.4 ? 'warm' : '';
            return `<div class="path-signal">
              <div class="path-chip ${chipClass}">${escHtml(sig)}</div>
              ${idx < data.critical_path.length - 1 ? '<div class="path-arrow">→</div>' : ''}
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  }

  // Suggestions
  if (data.suggestions && data.suggestions.length > 0) {
    html += `
    <div class="card">
      <div class="card-header">
        <div class="card-title">💡 Optimization Suggestions</div>
        <span style="font-size:11px;color:var(--text-dim)">${data.suggestions.length} found</span>
      </div>
      <div class="card-body">
        <div class="suggestion-list">
          ${data.suggestions.map(s => {
            const cfg = SEV[s.severity] || SEV.info;
            return `
          <div class="suggestion-item ${s.severity}" style="background:${cfg.bg}">
            <div class="sug-icon" style="color:${cfg.color}">${cfg.icon}</div>
            <div class="sug-content">
              <div class="sug-category" style="color:${cfg.color}">${escHtml(s.category)}</div>
              <div class="sug-message">${escHtml(s.message)}</div>
              ${s.signal ? `<span class="sug-signal">${escHtml(s.signal)}</span>` : ''}
            </div>
          </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  } else {
    html += `
    <div class="card">
      <div class="card-header"><div class="card-title">💡 Optimization Suggestions</div></div>
      <div class="card-body" style="color:var(--text-dim);font-size:12px;padding:14px">
        No suggestions — design looks clean.
      </div>
    </div>`;
  }

  panel.innerHTML = html;
}

// ── HTML escape ───────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
